<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="form-box">

        <h1>Register</h1>

        <form>

            <input type="text"
                   placeholder="Enter Username">

            <input type="email"
                   placeholder="Enter Email">

            <input type="password"
                   placeholder="Enter Password">

            <button type="submit">
                Register
            </button>

        </form>

    </div>

</body>
</html>
