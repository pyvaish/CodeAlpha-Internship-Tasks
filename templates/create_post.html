<!DOCTYPE html>
<html>

<head>
    <title>Create Post</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="form-box">

        <h1>Create Post</h1>

        <form method="POST">

            <textarea
                name="content"
                placeholder="Write your post"
                required>
            </textarea>

            <button type="submit">
                Post
            </button>

        </form>

    </div>

</body>
</html>
